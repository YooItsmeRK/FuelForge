<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Recipe | FuelForge</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid px-lg-5">
            <a class="navbar-brand text-decoration-none" href="index.html">
                <div class="logo-container d-flex align-items-center">
                    <img src="logo.png" alt="FuelForge"
                        style="height: 45px; object-fit: contain; transform: scale(2.2); transform-origin: left center;">
                </div>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"
                aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-center" id="navMenu">
                <ul class="navbar-nav mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="recipes.html">Recipes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="submit.html">Submit Recipes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="about.html">About Us</a>
                    </li>
                    <li class="nav-item d-lg-none mt-3">
                        <a href="get_started.html" class="btn btn-get-started w-100">Get Started</a>
                    </li>
                </ul>
            </div>

            <div class="d-none d-lg-flex ms-auto align-items-center">
                <!-- Replaced red button with logo based on latest mockup -->
                <div
                    style="font-family: 'Cinzel', serif; font-weight: 700; font-size: 1.5rem; text-align: left; line-height: 1; color: #fff;">
                    Recipes <span style="color: #ff5722; font-size: 1.1rem; vertical-align: middle;">FOR</span><br>
                    <span style="font-size: 1.6rem; color: #ff5722;">R</span>eal <span
                        style="font-size: 1.6rem;">M</span>en
                </div>
            </div>
        </div>
    </nav>

    <!-- Submit Page Content -->
    <section class="section-padding" style="min-height: calc(100vh - 150px);">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8">
                    <h2 class="font-heading text-center mb-5 border-bottom border-dark pb-3">Submit Your Recipe</h2>

                    <form class="rounded" id="submitRecipeForm">

                        <div class="mb-4">
                            <label for="name" class="form-label text-white">Your name</label>
                            <input type="text" class="form-control" id="name"
                                style="background-color: var(--bg-dark); color: white; border: 1px solid #333;"
                                required>
                        </div>

                        <div class="mb-4">
                            <label for="email" class="form-label text-white">Email address</label>
                            <input type="email" class="form-control" id="email"
                                style="background-color: var(--bg-dark); color: white; border: 1px solid #333;"
                                required>
                        </div>

                        <div class="mb-4">
                            <label for="recipeTitle" class="form-label text-white">Recipe Title</label>
                            <input type="text" class="form-control" id="recipeTitle"
                                style="background-color: var(--bg-dark); color: white; border: 1px solid #333;"
                                required>
                        </div>

                        <div class="mb-4">
                            <label for="category" class="form-label text-white">Category</label>
                            <select class="form-select" id="category"
                                style="background-color: var(--bg-dark); color: white; border: 1px solid #333;"
                                required>
                                <option value="" disabled selected>Select category</option>
                                <option value="bbq">BBQ Grilling</option>
                                <option value="high-protein">High Protein Meals</option>
                                <option value="quick">Quick Meals</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="ingredients" class="form-label text-white">Ingredients</label>
                            <textarea class="form-control" id="ingredients" rows="4"
                                style="background-color: var(--bg-dark); color: white; border: 1px solid #333;"
                                required></textarea>
                        </div>

                        <div class="mb-5">
                            <label for="instructions" class="form-label text-white">Instructions</label>
                            <textarea class="form-control" id="instructions" rows="4"
                                style="background-color: var(--bg-dark); color: white; border: 1px solid #333;"
                                required></textarea>
                        </div>

                        <div class="text-center mt-3">
                            <button type="submit" class="btn btn-primary px-4 py-2" style="border-radius: 4px;">Submit
                                Recipe</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer style="margin-top: auto;">
        <div class="container">
            <p class="mb-0">© 2026 FuelForge | Recipes For Real Men</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById('submitRecipeForm').addEventListener('submit', function (e) {
            e.preventDefault();
            alert('Recipe submitted successfully! Our team will review it shortly.');
            this.reset();
        });
    </script>
</body>

</html>
